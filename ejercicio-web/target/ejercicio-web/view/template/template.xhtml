<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<f:view locale="#{sessionController.locale}"/>
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet name="css/style.css"/>
    <script>function onBodyLoaded() {}</script>
    <title>#{global.appName} - #{empty pageTitle ? 'Home' : pageTitle}</title>
</h:head>
<h:body onload="onBodyLoaded();">
    <header>
        <h1>#{global.appName}</h1>
        <nav>
            <h:link outcome="/view/documento/list" value="#{global.listLabel}"/>
            <h:form id="localeForm" styleClass="locale-form" prependId="false">
                <ui:repeat value="#{sessionController.locales.entrySet().toArray()}" var="loc">
                    <h:commandLink value="#{loc.value}" action="#{sessionController.changeLocale(loc.key)}" class="locale-link" style="margin-left: 0.5em;"/>
                </ui:repeat>
            </h:form>
        </nav>
    </header>
    <div class="wrapper">
        <main id="mainContent">
            <ui:insert name="content"/>
        </main>
    </div>
    <footer>Ejercicio PRHTA Practico - Singleton, i18n</footer>
</h:body>
</html>
