<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:body>
        <ui:composition template="/view/template/template.xhtml">
            <ui:define name="content">

                <!-- ✅ JS y CSS dentro del ui:define -->
                <h:outputStylesheet library="css" name="modal.css"/>
                <h:outputScript library="js" name="modal.js" target="head"/>

                <ui:param name="pageTitle" value="#{global.documentListTitle}"/>
                <div class="card">
                    <h2>#{global.documentListTitle}</h2>
                    <div class="stats-bar">
                        #{global.statsLabel}: #{applicationManager.totalDocumentosCreados}
                    </div>

                    <h:form id="listForm">
                        <div class="button-group">
                            <h:commandButton
                                value="#{global.createLabel}"
                                action="#{documentoWebController.prepareCreate()}"
                                class="btn btn-primary"/>
                        </div>

                        <h:dataTable value="#{documentoWebController.items}"
                                     var="doc" styleClass="table">
                            <h:column>
                                <f:facet name="header">#{documento.nombreLabel}</f:facet>
                                    #{doc.nombre}
                            </h:column>
                            <h:column>
                                <f:facet name="header">#{documento.fechaLabel}</f:facet>
                                    #{doc.fecha}
                            </h:column>
                            <h:column>
                                <f:facet name="header">#{documento.estadoLabel}</f:facet>
                                    #{doc.estado}
                            </h:column>


                            <h:column>
                                <f:facet name="header">Detalle</f:facet>
                                <h:outputText value="#{doc.detalleListado}"/>
                            </h:column>

                            <h:column>
                                <f:facet name="header">Acciones</f:facet>
                                <h:commandButton
                                    value="Edit"
                                    action="#{documentoWebController.prepareEdit(doc)}"
                                    class="btn btn-secondary"/>
                                <h:commandButton
                                    value="Detalles"
                                    class="btn btn-info"
                                    type="button">
                                    <f:ajax execute="@this"
                                            listener="#{documentoWebController.prepareDetalle(doc)}"
                                            render="detailPanel"
                                            onevent="handleModalEvent"/>
                                </h:commandButton>
                            </h:column>
                        </h:dataTable>


                        <h:panelGroup id="detailPanel">
                            <ui:include src="/view/documento/fragments/detailModal.xhtml"/>
                        </h:panelGroup>


                    </h:form>
                </div>

            </ui:define>
        </ui:composition>
    </h:body>
</html>
